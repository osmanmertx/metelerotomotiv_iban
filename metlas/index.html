<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metlas IBAN Bilgileri</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f3f6fb;
      color: #111;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 16px;
    }

    /* 🔥 HEADER TURUNCU */
    .header {
      background: linear-gradient(135deg, #F68645, #EB6627);
      color: white;
      padding: 22px 16px;
      border-radius: 18px;
      text-align: center;
      margin-bottom: 14px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
    }

    .header p {
      margin: 7px 0 0;
      font-size: 14px;
      opacity: .9;
    }

    .title-box, .card, .note {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    .title-box {
      padding: 15px;
      margin-bottom: 14px;
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .company {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #ddd;
      margin-bottom: 14px;
      font-size: 16px;
      outline: none;
    }

    /* 🔥 INPUT FOCUS TURUNCU */
    input:focus {
      border-color: #EB6627;
    }

    .card {
      padding: 15px;
      margin-bottom: 11px;
    }

    /* 🔥 BANKA BAŞLIK TURUNCU */
    .bank {
      font-size: 19px;
      font-weight: bold;
      color: #EB6627;
      margin-bottom: 7px;
    }

    .iban {
      font-size: 17px;
      word-break: break-word;
      letter-spacing: .4px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    /* 🔥 BUTON TURUNCU */
    button {
      width: 100%;
      border: none;
      padding: 13px;
      border-radius: 12px;
      background: linear-gradient(135deg, #F68645, #EB6627);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    button.copied {
      background: #198754;
    }

    .note {
      padding: 13px;
      font-size: 13px;
      color: #555;
      line-height: 1.4;
      margin-top: 14px;
    }

    .empty {
      text-align: center;
      color: #666;
      padding: 20px 0;
      font-size: 15px;
    }

    .toast {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: white;
      padding: 12px 18px;
      border-radius: 30px;
      display: none;
      font-size: 14px;
      z-index: 999;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>METLAS</h1>
      <p>Banka IBAN Bilgisi</p>
    </div>

    <div class="title-box">
      <div class="label">Alıcı Ünvanı</div>
      <div class="company">Meteler Otomotiv LTD. ŞTİ.</div>
      <button onclick="copyText('Meteler Otomotiv LTD. ŞTİ.', this)">Ünvanı Kopyala</button>
    </div>

    <!-- 🔥 ARAMA KALDI AMA TEK IBAN VAR -->
    <input type="text" id="searchInput" placeholder="Banka ara..." onkeyup="filterBanks()" />

    <div id="bankList"></div>

    <div class="note">
      Ödeme yapmadan önce alıcı ünvanını ve IBAN bilgisini kontrol ediniz.
    </div>
  </div>

  <div class="toast" id="toast">Kopyalandı ✓</div>

  <script>
    /* 🔥 TEK IBAN */
    const banks = [
      { name: "AKBANK", iban: "TR41 0004 6000 9988 8000 2502 41" }
    ];

    const bankList = document.getElementById("bankList");

    function renderBanks(list) {
      bankList.innerHTML = "";

      if (list.length === 0) {
        bankList.innerHTML = `<div class="empty">Banka bulunamadı.</div>`;
        return;
      }

      list.forEach(bank => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="bank">${bank.name}</div>
          <div class="iban" onclick="copyText('${bank.iban}', this)">${bank.iban}</div>
          <button onclick="copyText('${bank.iban}', this)">IBAN Kopyala</button>
        `;

        bankList.appendChild(card);
      });
    }

    function copyText(text, element) {
      navigator.clipboard.writeText(text).then(() => {
        showToast();

        if (element && element.tagName === "BUTTON") {
          const oldText = element.innerText;
          element.innerText = "Kopyalandı ✓";
          element.classList.add("copied");

          setTimeout(() => {
            element.innerText = oldText;
            element.classList.remove("copied");
          }, 1200);
        }
      });
    }

    function showToast() {
      const toast = document.getElementById("toast");
      toast.style.display = "block";

      setTimeout(() => {
        toast.style.display = "none";
      }, 1200);
    }

    function normalizeText(text) {
      return text
        .toLocaleLowerCase("tr-TR")
        .replaceAll("ı", "i")
        .replaceAll("ş", "s")
        .replaceAll("ğ", "g")
        .replaceAll("ü", "u")
        .replaceAll("ö", "o")
        .replaceAll("ç", "c");
    }

    function filterBanks() {
      const search = normalizeText(document.getElementById("searchInput").value.trim());

      const filtered = banks.filter(bank =>
        normalizeText(bank.name).startsWith(search)
      );

      renderBanks(filtered);
    }

    renderBanks(banks);
  </script>

</body>
</html>
