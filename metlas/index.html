<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metlas IBAN Bilgileri</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f3f6fb;
      color: #111;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 16px;
    }

    .header {
      background: linear-gradient(135deg, #F68645, #EB6627);
      color: white;
      padding: 22px 16px;
      border-radius: 18px;
      text-align: center;
      margin-bottom: 14px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
    }

    .title-box, .card, .note {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    .title-box {
      padding: 15px;
      margin-bottom: 14px;
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .company {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .card {
      padding: 18px;
      margin-bottom: 11px;
    }

    .bank {
      font-size: 20px;
      font-weight: bold;
      color: #EB6627;
      margin-bottom: 8px;
    }

    .iban {
      font-size: 18px;
      word-break: break-word;
      letter-spacing: .5px;
      margin-bottom: 12px;
      cursor: pointer;
    }

    button {
      width: 100%;
      border: none;
      padding: 14px;
      border-radius: 12px;
      background: linear-gradient(135deg, #F68645, #EB6627);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button.copied {
      background: #198754;
    }

    .note {
      padding: 13px;
      font-size: 13px;
      color: #555;
      line-height: 1.4;
      margin-top: 14px;
    }

    .toast {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: white;
      padding: 12px 18px;
      border-radius: 30px;
      display: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>METLAS</h1>
      <p>Banka IBAN Bilgisi</p>
    </div>

    <div class="title-box">
      <div class="label">Alıcı Ünvanı</div>
      <div class="company">Metlas Oto Lastik LTD. ŞTİ.</div>
      <button onclick="copyText('Metlas Oto Lastik LTD. ŞTİ.', this)">Ünvanı Kopyala</button>
    </div>

    <!-- 🔥 TEK IBAN KART -->
    <div class="card">
      <div class="bank">AKBANK</div>
      <div class="iban" onclick="copyText('TR41 0004 6000 9988 8000 2502 41', this)">
        TR41 0004 6000 9988 8000 2502 41
      </div>
      <button onclick="copyText('TR41 0004 6000 9988 8000 2502 41', this)">
        IBAN Kopyala
      </button>
    </div>

    <div class="note">
      Ödeme yapmadan önce alıcı ünvanını ve IBAN bilgisini kontrol ediniz.
    </div>

  </div>

  <div class="toast" id="toast">Kopyalandı ✓</div>

  <script>
    function copyText(text, element) {
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById("toast");
        toast.style.display = "block";

        setTimeout(() => {
          toast.style.display = "none";
        }, 1200);

        if (element && element.tagName === "BUTTON") {
          const oldText = element.innerText;
          element.innerText = "Kopyalandı ✓";
          element.classList.add("copied");

          setTimeout(() => {
            element.innerText = oldText;
            element.classList.remove("copied");
          }, 1200);
        }
      });
    }
  </script>

</body>
</html>
