<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteler IBAN Seçimi</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f3f6fb;
      color: #111;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 18px;
    }

    .header {
      background: #012c5f;
      color: white;
      padding: 26px 18px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
    }

    .header p {
      margin-top: 8px;
      font-size: 14px;
      opacity: .9;
    }

    .card {
      display: block;
      text-decoration: none;
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
      font-size: 18px;
      font-weight: bold;
      color: #012c5f;
      transition: 0.2s;
    }

    .card:active {
      transform: scale(0.98);
    }

    .note {
      background: white;
      padding: 14px;
      border-radius: 16px;
      font-size: 13px;
      color: #555;
      margin-top: 14px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

  </style>
</head>
<body>

  <div class="container">
    
    <div class="header">
      <h1>Meteler Otomotiv</h1>
      <p>Ödeme yapacağınız şirketi seçiniz</p>
    </div>

    <a href="/hyundai/" class="card">
      🚗 Hyundai Meteler
    </a>

    <a href="/kgm/" class="card">
      🛻 KGM (SsangYong)
    </a>

    <a href="/metlas/" class="card">
        🛞 Metlas
    </a>

    <div class="note">
      Lütfen ödeme yapmadan önce doğru şirketi seçtiğinizden emin olunuz.
    </div>

  </div>

</body>
</html>
