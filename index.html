<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteler Otomotiv IBAN Bilgileri</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f3f6fb;
      color: #111;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 18px;
    }

    .header {
      background: #012c5f;
      color: white;
      padding: 22px;
      border-radius: 18px;
      text-align: center;
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
    }

    .header p {
      margin: 8px 0 0;
      font-size: 14px;
      opacity: .9;
    }

    .title-box {
      background: white;
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .company {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #ddd;
      margin-bottom: 16px;
      font-size: 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    .bank {
      font-size: 20px;
      font-weight: bold;
      color: #012c5f;
      margin-bottom: 8px;
    }

    .iban {
      font-size: 17px;
      word-break: break-word;
      margin-bottom: 12px;
      letter-spacing: .5px;
    }

    button {
      width: 100%;
      border: none;
      padding: 13px;
      border-radius: 12px;
      background: #012c5f;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 6px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: white;
      padding: 12px 18px;
      border-radius: 30px;
      display: none;
      font-size: 14px;
      z-index: 999;
    }

    .footer {
      text-align: center;
      color: #777;
      font-size: 12px;
      margin-top: 22px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Meteler Otomotiv</h1>
      <p>Banka IBAN Bilgileri</p>
    </div>

    <div class="title-box">
      <div class="label">Alıcı Ünvanı</div>
      <div class="company" id="companyName">Meteler Otomotiv İnşaat LTD. ŞTİ.</div>
      <button onclick="copyText(document.getElementById('companyName').innerText)">Ünvanı Kopyala</button>
    </div>

    <input type="text" id="searchInput" placeholder="Banka ara..." onkeyup="filterBanks()" />

    <div id="bankList"></div>

    <div class="footer">
      IBAN bilgileri ödeme öncesi kontrol edilmelidir.
    </div>
  </div>

  <div class="toast" id="toast">Kopyalandı</div>

  <script>
    const banks = [
      { name: "AKBANK", iban: "TR45 0004 6000 9988 8000 0509 31" },
      { name: "GARANTİ BANKASI", iban: "TR52 0006 2000 5150 0006 2998 82" },
      { name: "YKB K.K.", iban: "TR82 0006 7010 0000 0065 2967 91" },
      { name: "VAKIFBANK", iban: "TR26 0001 5001 5800 7281 6920 86" },
      { name: "VAKIF KATILIM BANKASI", iban: "TR17 0021 0000 0002 1717 9000 01" },
      { name: "TÜRKİYE İŞ BANKASI", iban: "TR90 0006 4000 0017 2000 8608 42" },
      { name: "TEB", iban: "TR82 0003 2000 1950 0000 0162 88" },
      { name: "ZİRAAT BANKASI", iban: "TR51 0001 0002 4829 3613 7150 04" },
      { name: "FİNANSBANK", iban: "TR94 0011 1000 0000 0015 9421 24" },
      { name: "HALKBANK", iban: "TR18 0001 2009 6900 0010 0004 28" },
      { name: "DENİZBANK", iban: "TR20 0013 4000 0025 7873 8000 01" },
      { name: "ALBARAKA", iban: "TR17 0020 3000 0065 2088 0000 01" },
      { name: "KUVEYT TÜRK", iban: "TR52 0020 5000 0007 1435 3000 01" }
    ];

    const bankList = document.getElementById("bankList");

    function renderBanks(list) {
      bankList.innerHTML = "";

      list.forEach(bank => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="bank">${bank.name}</div>
          <div class="iban">${bank.iban}</div>
          <button onclick="copyText('${bank.iban}')">IBAN Kopyala</button>
        `;

        bankList.appendChild(card);
      });
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast();
      });
    }

    function showToast() {
      const toast = document.getElementById("toast");
      toast.style.display = "block";

      setTimeout(() => {
        toast.style.display = "none";
      }, 1500);
    }

    function filterBanks() {
      const search = document.getElementById("searchInput").value.toLowerCase();

      const filtered = banks.filter(bank =>
        bank.name.toLowerCase().includes(search)
      );

      renderBanks(filtered);
    }

    renderBanks(banks);
  </script>

</body>
</html>
